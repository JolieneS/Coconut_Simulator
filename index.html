<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COCO – Island Explorer</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ── INTRO SCREEN ── -->
  <div class="screen active" id="intro">
    <img src="coco_intro.png" alt="Coco Intro" id="intro-img"
         onerror="this.style.display='none'; document.getElementById('intro-fallback').style.display='flex'"/>
    <div id="intro-fallback">
      <div class="fallback-title">COCO 🥥</div>
      <div class="fallback-sub">(place coco_intro.png here)</div>
    </div>
    <div id="intro-sub">Loading paradise…</div>
  </div>

  <!-- ── MAIN MENU SCREEN ── -->
  <div class="screen" id="menu">
    <div id="menu-bg">
      <img src="coco_q.png" alt="Beach background"
           onerror="this.style.background='linear-gradient(135deg,#083a60,#1a9ee0,#e8c46a)';this.removeAttribute('src')"/>
      <div id="menu-overlay"></div>
    </div>
    <div id="menu-content">
      <div id="menu-title">COCO <span>🥥</span></div>
      <button class="menu-btn" onclick="startPlay()">▶ Play</button>
      <button class="menu-btn" onclick="showSettings()">⚙ Settings</button>
      <button class="menu-btn danger" onclick="quitToIntro()">✕ Quit</button>
    </div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div class="screen" id="settings">
    <div id="settings-box">
      <div id="settings-title">Settings</div>
      <div id="settings-q">Select a Game Mode</div>
      <button class="mode-btn arcade" onclick="startArcade()">🎮 Arcade</button>
      <button class="mode-btn realistic" onclick="startRealistic()">🌊 Realistic</button>
      <button id="back-btn" onclick="goBack('menu')">← Back to Menu</button>
    </div>
  </div>

  <!-- ── REALISTIC SCREEN ── -->
  <div class="screen" id="realistic-screen">
    <div id="realistic-box">
      <div id="realistic-emoji">🥥</div>
      <h2 id="realistic-text">"Coconuts have no eyes,<br/>so you can't see anything."</h2>
      <p id="realistic-sub">REALISTIC MODE ACTIVATED</p>
      <button id="realistic-back" onclick="goBack('menu')">← Back to Menu</button>
    </div>
  </div>

  <!-- ── 360 GAME SCREEN ── -->
  <div class="screen" id="game">
    <canvas id="game-canvas"></canvas>
    <svg id="game-compass" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="22" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="24" y="10"  text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">N</text>
      <text x="24" y="42"  text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">S</text>
      <text x="8"  y="27"  text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">W</text>
      <text x="40" y="27"  text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">E</text>
      <polygon id="compass-needle" points="24,14 22,26 24,28 26,26" fill="#ff4444"/>
      <polygon points="24,34 22,26 24,28 26,26" fill="white"/>
      <circle cx="24" cy="24" r="3" fill="white"/>
    </svg>
    <div id="tilt-bar"><div id="tilt-fill"></div></div>
    <button id="game-back" onclick="goBack('menu')">← Menu</button>
  </div>

  <!-- scripts -->
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
